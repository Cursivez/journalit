name: Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare release notes
        id: notes
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          changelog="changelog/CHANGELOG_v${tag}.md"
          notes_file="RELEASE_NOTES_GENERATED.md"
          if [ -f "$changelog" ]; then
            cp "$changelog" "$notes_file"
          else
            printf '# %s\n\nRelease artifacts for Journalit %s.\n' "$tag" "$tag" > "$notes_file"
          fi
          echo "NOTES_FILE=$notes_file" >> "$GITHUB_OUTPUT"

      - name: Create public release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          gh release create "$tag" \
            --title="$tag" \
            --notes-file="${{ steps.notes.outputs.NOTES_FILE }}" \
            main.js manifest.json styles.css
